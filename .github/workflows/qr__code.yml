name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
#    - name: Install Python dependencies
#      run: |
#          python -m pip install --upgrade pip
#          pip install pytest numpy scikit-image matplotlib
#          pip install -e .[dev]

#    - name: Run Python Test Suite
#      run: |
#              pytest test_suite/python/ -v

    - name: Configure CMake
      run: cmake -S ${{ github.workspace }}/c++_implementation -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
